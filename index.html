<!DOCTYPE html>
<html>

<head>
    <link href="style.css" rel="stylesheet" type="text/css">
    <title>Haxball Agent Lite</title>
</head>

<body>
    <div class="bar-container">
        <div class="bar">
            <div class="scoreboard">
                <div class="teamicon red"></div>
                <div class="score" data-hook="red-score">0</div>
                <div>-</div>
                <div class="score" data-hook="blue-score">0</div>
                <div class="teamicon blue"></div>
            </div>
            <div class="game-timer-view">
                <span class="overtime">OVERTIME!</span>
                <span class="digit">0</span>
                <span class="digit">0</span>
                <span class="null">:</span>
                <span class="digit">0</span>
                <span class="digit">0</span>
            </div>
        </div>

        <!-- Copilot usage counter (top-right of bar) -->
        <div class="copilot-usage-bar" title="Số lượt đã dùng GitHub Copilot trong phiên này">
            <span class="copilot-usage-icon">🤖</span>
            <span class="copilot-usage-label">Copilot</span>
            <span id="copilot-usage-count" class="copilot-usage-count">0</span>
            <span class="copilot-usage-unit">lượt</span>
            <button class="copilot-reset-btn" onclick="CopilotUsageTracker.reset()" title="Reset counter">↺</button>
            <button class="copilot-settings-btn" onclick="CopilotSettings.openPanel()" title="Cài đặt GitHub Token">⚙</button>
        </div>
    </div>

    <!-- Copilot Settings Panel (modal) -->
    <div id="copilot-settings-panel" class="copilot-settings-overlay" style="display:none">
        <div class="copilot-settings-box">
            <h3 class="copilot-settings-title">🤖 GitHub Copilot Bot</h3>
            <p class="copilot-settings-desc">
                Nhập <strong>GitHub Personal Access Token</strong> để dùng Copilot làm AI bot.<br>
                Token cần scope <code>models:read</code> (GitHub Models API).
            </p>
            <label for="copilot-token-input" class="copilot-settings-desc" style="margin:0">
                GitHub Personal Access Token
            </label>
            <input id="copilot-token-input" class="copilot-token-input"
                   type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                   autocomplete="off" />
            <div class="copilot-settings-actions">
                <button class="btn map-btn" onclick="CopilotSettings.saveFromPanel()">💾 Lưu</button>
                <button class="btn map-btn" onclick="CopilotSettings.closePanel()">✕ Đóng</button>
            </div>
            <p class="copilot-settings-hint">
                Sau khi lưu, mở DevTools console và chạy:<br>
                <code>new CopilotBot(1, 1, CopilotSettings.getToken()).start()</code>
            </p>
        </div>
    </div>

    <!-- Map Loader Section -->
    <div class="map-loader-container">
        <div class="map-loader">
            <label for="map-upload" class="btn map-btn">📁 Load Map (.hbs)</label>
            <input id="map-upload" type="file" accept=".hbs,.json" style="display:none" />
            <button id="reset-map" class="btn map-btn">🔄 Reset</button>
            <button id="clear-storage" class="btn map-btn" title="Clear custom stadium from memory">🗑️ Clear
                Storage</button>
            <span id="current-map-name" class="map-name">Classic</span>
        </div>
    </div>

    <canvas id="canvas_div"></canvas>

    <!-- Core Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
    <script src="ppo-bot.js"></script>
    <script defer src="msgpack.min.js"></script>
    <script defer src="bot.js"></script>
    <script defer src="map-loader.js"></script>
    <script defer src="stadium-override.js"></script>
    <script defer src="script.js"></script>
    <script defer src="agent-api.js"></script>
    <script defer src="enhanced-bot.js"></script>
    <script defer src="copilot-bot.js"></script>
</body>

</html>
